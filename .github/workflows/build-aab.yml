name: Build AAB
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: npm install -g eas-cli
      - run: eas build --platform android --profile production --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          
